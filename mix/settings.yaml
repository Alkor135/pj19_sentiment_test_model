# mix/settings.yaml
# Конфигурация тикера MIX для sentiment pipeline.
# Секции common/shared/model_defaults/models/combine:
# common задаёт базовые значения, остальные секции «накрывают» одноимённые ключи при загрузке.

common:
  ticker: 'MIX'  # Важно: тикер в верхнем регистре для корректного формирования имён БД и Markdown
  ticker_lc: 'mix'  # Важно: тикер в нижнем регистре для формирования путей к файлам и папкам
  ticker_close: 'MXM6'              # Фьючерс для закрытия позиции (trade)
  ticker_open: 'MXM6'               # Фьючерс для открытия позиции (trade)
  quantity_test: 1                  # Количество контрактов для бэктеста и аналитики
  notional_capital: 105000          # Условный капитал для QuantStats отчёта

  # Выбор новостей по провайдеру
  provider: 'investing_prime_interfax'  # Новостные провайдеры: 'investing_prime_interfax' или 'prime_interfax'

  time_start: '21:00:00'  # Начало дневной свечи для формирования Markdown и расчета Equity (время предыдущей торговой сессии)
  time_end: '20:59:59'  # Конец дневной свечи для формирования Markdown и расчета Equity (время текущей торговой сессии)

  md_path: 'C:/Users/Alkor/gd/md_rss_all_oil_gaz'  # Путь для сохранения Markdown файлов с новостями
  db_news_dir: 'C:/Users/Alkor/gd/db_rss'  # Папка где хранятся БД с новостями
  path_db_minute: 'C:/Users/Alkor/gd/data_quote_db/{ticker}_futures_minute_2025.db'  # Путь к минутной БД (используется в download_minutes_to_db.py)
  path_db_day: 'C:/Users/Alkor/gd/data_quote_db/{ticker}_futures_day_2025_21-00.db'  # Путь к дневной БД (используется в convert_minutes_to_days.py)
  # CSV с минутами от QUIK lua-экспортёра (trade/quik_export_minutes.lua)
  quik_csv_path: 'C:/Users/Alkor/VSCode/pj19_sentiment_test_model/trade/quik_export/minutes.csv'

  # Окно дат для sentiment_group_stats.py
  stats_date_from: '2025-09-01'  # Дата начала периода для анализа групповой статистики сентимента (формат 'YYYY-MM-DD')
  stats_date_to: '2027-01-01'  # Дата окончания периода для анализа групповой статистики сентимента (формат 'YYYY-MM-DD')

  # Окно дат для sentiment_backtest.py
  backtest_date_from: '2025-09-01'  # Дата начала тестового периода для sentiment_backtest.py (формат 'YYYY-MM-DD')
  backtest_date_to: '2027-01-01'  # Дата окончания тестового периода для sentiment_backtest.py (формат 'YYYY-MM-DD')

shared:
  num_mds: 200                      # Последних интервалов (дней) для markdown
  num_dbs: 8                        # Последних файлов БД новостей для обработки
  start_date_download_minutes: '2025-06-24'  # Дата, с которой начинается загрузка минутных данных

model_defaults:  # Общие настройки для всех модельных папок тикера
  ollama_timeout_seconds: 180  # Таймаут одного HTTP-запроса к Ollama для sentiment_analysis.py
  use_cache: true  # Использовать PKL-кэш и пропускать md-файлы с неизмененным content_hash
  sentiment_output_pkl: 'C:/Users/Alkor/VSCode/pj19_sentiment_test_model/{ticker_lc}/{model_dir}/sentiment_scores.pkl'  # Файл для сохранения рассчитанных sentiment-скоров
  predict_path: 'C:/Users/Alkor/gd/predict_ai/pj19/{ticker_lc}/{model_dir}'  # Путь для сохранения предсказаний sentiment модели (sentiment_to_predict.py)
  group_stats_output_xlsx: 'sentiment_group_stats.xlsx'  # Имя итогового XLSX отчёта в папке group_stats

models:
  # Ключи верхнего уровня совпадают с именами папок моделей; sentiment_model — имя модели Ollama.
  gpt-oss_20b:
    sentiment_model: 'gpt-oss:20b'
  gemma3_12b:
    sentiment_model: 'gemma3:12b'
  gemma4_26b:
    sentiment_model: 'gemma4:26b'
  gemma4_31b:
    sentiment_model: 'gemma4:31b'
  gemma4_e2b:
    sentiment_model: 'gemma4:e2b'
  gemma4_e4b:
    sentiment_model: 'gemma4:e4b'
  qwen2.5_14b:
    sentiment_model: 'qwen2.5:14b'
  qwen2.5_7b:
    sentiment_model: 'qwen2.5:7b'
  qwen3.6_35b:
    sentiment_model: 'qwen3.6:35b'
  qwen3_14b:
    sentiment_model: 'qwen3:14b'

combine:  # Конфигурация для объединённой стратегии (используется в combine и combined_to_predict.py)
  model_1: 'gemma3_12b'             # Первая модель для объединённого сигнала
  # model_2: 'gemma4_e4b'             # Вторая модель для объединённого сигнала
  model_2: 'gemma4_e2b'             # Вторая модель для объединённого сигнала
  notional_capital: 105000          # Условный капитал для QuantStats отчёта combine
  predict_path: 'C:/Users/Alkor/gd/predict_ai/pj19/{ticker_lc}/combine'  # Путь для сохранения предсказаний combined модели
  time_start: '21:00:00'            # Начало дневной свечи для расчётов combine, если нужно переопределить common
